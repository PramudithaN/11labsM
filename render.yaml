
services:
  # ── Redis ──────────────────────────────────────────────────────
  - type: redis
    name: tts-redis
    plan: free
    ipAllowList: []

  # ── FastAPI API server ─────────────────────────────────────────
  - type: web
    name: tts-api
    env: docker
    dockerfilePath: tts_backend/Dockerfile
    dockerContext: tts_backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: tts-redis
          property: connectionString
      - key: APP_ENV
        value: production
      - key: ELEVENLABS_API_KEY
        sync: false          # set this in Render dashboard
      - key: TRANSLATION_PROVIDER
        value: mymemory
      # ── S3-compatible storage (use Cloudflare R2 or AWS S3) ────
      - key: S3_ENDPOINT_URL
        sync: false          # e.g. https://<account>.r2.cloudflarestorage.com
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        value: tts-audio
      - key: S3_REGION
        value: auto          # use "us-east-1" for AWS, "auto" for Cloudflare R2
      - key: S3_PUBLIC_ENDPOINT_URL
        sync: false          # public URL for presigned URLs (same as S3_ENDPOINT_URL for R2)

  # ── Celery worker ──────────────────────────────────────────────
  - type: worker
    name: tts-worker
    env: docker
    dockerfilePath: tts_backend/Dockerfile
    dockerContext: tts_backend
    plan: free
    startCommand: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: tts-redis
          property: connectionString
      - key: APP_ENV
        value: production
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: TRANSLATION_PROVIDER
        value: mymemory
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        value: tts-audio
      - key: S3_REGION
        value: auto
