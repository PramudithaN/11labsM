
services:
  # ── Redis ──────────────────────────────────────────────────────
  - type: redis
    name: tts-redis
    plan: free
    ipAllowList: []

  # ── FastAPI API server ─────────────────────────────────────────
  - type: web
    name: tts-api
    env: docker
    dockerfilePath: tts_backend/Dockerfile
    dockerContext: tts_backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: tts-redis
          property: connectionString
      - key: APP_ENV
        value: production
      - key: ELEVENLABS_API_KEY
        sync: false          # set this in Render dashboard
      - key: TRANSLATION_PROVIDER
        value: mymemory

  # ── Celery worker ──────────────────────────────────────────────
  - type: worker
    name: tts-worker
    env: docker
    dockerfilePath: tts_backend/Dockerfile
    dockerContext: tts_backend
    plan: free
    startCommand: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: tts-redis
          property: connectionString
      - key: APP_ENV
        value: production
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: TRANSLATION_PROVIDER
        value: mymemory
